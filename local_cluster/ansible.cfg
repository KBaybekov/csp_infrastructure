[defaults]
remote_user = kbajbekov
# Отключаем строгую проверку ключей хостов (для тестовых сред)
host_key_checking = False
# Указываем путь к нашему инвентарному файлу
inventory = inventory/inventory.yml
# Отключаем создание .retry-файлов при ошибках
retry_files_enabled = False
# Используем стандартную библиотеку интерпретатора Python
interpreter_python = auto_silent
# Указываем путь для пользовательских модулей (если они будут)
library = ./library/

[ssh_connection]
# Ускоряем SSH-соединения
pipelining = True