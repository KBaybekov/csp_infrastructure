---
- name: Подготовка серверов к установке Kubernetes
  hosts: all
  gather_facts: true
  become: true

  tasks:
    - name: Добавление GPG-ключа Docker
      ansible.builtin.apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Добавление GPG-ключа Ceph
      ansible.builtin.apt_key:
        keyserver: keyserver.ubuntu.com
        id: E84AC2C0460F3994
        state: present

    - name: Обновление apt кэша
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      when: ansible_os_family == "Debian"


    - name: Установка базовых пакетов
      ansible.builtin.package:
        name:
          - python3
          - python3-pip
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - software-properties-common
        state: present

    - name: Отключение swap
      ansible.builtin.command: swapoff -a
      when: ansible_swaptotal_mb > 0
      changed_when: true

    - name: Удаление swap из fstab
      ansible.posix.mount:
        name: swap
        fstype: swap
        state: absent

    - name: Загрузка модулей ядра (overlay, br_netfilter)
      community.general.modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - overlay
        - br_netfilter

    - name: Настройка sysctl для Kubernetes
      ansible.posix.sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        state: present
        reload: true
      loop:
        - { name: net.bridge.bridge-nf-call-iptables, value: 1 }
        - { name: net.bridge.bridge-nf-call-ip6tables, value: 1 }
        - { name: net.ipv4.ip_forward, value: 1 }
